name: FreelancerAI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart Contract Tests ─────────────────────────────────────
  smart-contracts:
    name: Smart Contract Compile & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run Hardhat tests
        run: npm run test

  # ─── Backend Build ────────────────────────────────────────────
  backend:
    name: Backend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

  # ─── Frontend Build ───────────────────────────────────────────
  frontend:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${{ secrets.NEXT_PUBLIC_MARKETPLACE_ADDRESS }}
          NEXT_PUBLIC_ESCROW_ADDRESS: ${{ secrets.NEXT_PUBLIC_ESCROW_ADDRESS }}
          NEXT_PUBLIC_REPUTATION_ADDRESS: ${{ secrets.NEXT_PUBLIC_REPUTATION_ADDRESS }}
          NEXT_PUBLIC_AGENT_ADDRESS: ${{ secrets.NEXT_PUBLIC_AGENT_ADDRESS }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_RPC_URL: https://testnet-rpc.monad.xyz

  # ─── Deploy Backend to Cloud Run (main only) ──────────────────
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [backend, smart-contracts]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push backend Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelancerai-backend:${{ github.sha }} ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelancerai-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy freelancerai-backend \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/freelancerai-backend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=3001 \
            --set-env-vars="FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},AGENT_WALLET_ADDRESS=${{ secrets.NEXT_PUBLIC_AGENT_ADDRESS }},MARKETPLACE_ADDRESS=${{ secrets.NEXT_PUBLIC_MARKETPLACE_ADDRESS }},ESCROW_ADDRESS=${{ secrets.NEXT_PUBLIC_ESCROW_ADDRESS }},RPC_URL=https://testnet-rpc.monad.xyz" \
            --set-secrets="FIREBASE_SERVICE_ACCOUNT=freelancerai-firebase-sa:latest"
