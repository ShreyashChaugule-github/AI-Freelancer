services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MARKETPLACE_ADDRESS=${MARKETPLACE_ADDRESS}
      - ESCROW_ADDRESS=${ESCROW_ADDRESS}
      - REPUTATION_ADDRESS=${REPUTATION_ADDRESS}
      - AGENT_WALLET_ADDRESS=${AGENT_WALLET_ADDRESS}
      - RPC_URL=${RPC_URL:-https://testnet-rpc.monad.xyz}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
        NEXT_PUBLIC_ESCROW_ADDRESS: ${ESCROW_ADDRESS}
        NEXT_PUBLIC_REPUTATION_ADDRESS: ${REPUTATION_ADDRESS}
        NEXT_PUBLIC_AGENT_ADDRESS: ${AGENT_WALLET_ADDRESS}
        NEXT_PUBLIC_BACKEND_URL: http://backend:3001
        NEXT_PUBLIC_RPC_URL: ${RPC_URL:-https://testnet-rpc.monad.xyz}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
